version: 1
stack:
  camera:
    label: "4K RGB face camera"
    recommendation: "Prefer fixed exposure, fixed gain, fixed white balance, and 60-120 fps operating modes when timing precision matters."
    required_metadata:
      - frame_timestamp_ms
      - exposure
      - gain
      - white_balance
      - roi_confidence
      - skin_coverage_ratio
      - motion_score
      - lighting_score
  finger_ppg:
    label: "PSL-iPPG2C"
    recommendation: "Use as the primary morphology sensor for beat timing and waveform quality."
    required_metadata:
      - sample_timestamp_ms
      - sample_rate_hz
      - dropped_samples
      - ppg_sqi
      - beat_channel_available
  synchronization:
    label: "Shared host timestamp"
    recommendation: "Record host timestamps for both camera frames and finger PPG sample chunks."

outputs:
  heart_rate:
    id: "1.1"
    product_label: "Heart Rate"
    type: "regression"
    primary_modalities:
      - camera_rppg
      - finger_ppg
    reference:
      - ECG
      - validated_pulse_reference
    recommended_release: "V1"
    no_read_conditions:
      - low_camera_sqi
      - low_finger_ppg_sqi
      - high_motion
      - camera_finger_disagreement
    internal_targets:
      rest_mae_bpm: 2.0
      motion_mae_bpm: 5.0

  hrv:
    id: "1.2"
    product_label: "Resting HRV"
    type: "derived_metrics"
    metrics:
      - RMSSD
      - SDNN
    primary_modalities:
      - finger_ppg
    secondary_modalities:
      - camera_rppg
    reference:
      - ECG
    recommended_release: "V1"
    operating_constraints:
      - resting_only
      - minimum_window_5_minutes
      - seated_or_supine
    no_read_conditions:
      - low_finger_ppg_sqi
      - excessive_motion
      - insufficient_window
      - unstable_beat_detection

  autonomic_arousal:
    id: "1.3"
    product_label: "Autonomic Arousal Index"
    type: "regression_or_classification"
    primary_modalities:
      - finger_ppg
      - camera_rppg
    derived_features:
      - hrv
      - respiration_proxy
      - vasomotor_response
    reference:
      - protocol_label
      - psychometric_scale
      - optional_eda
      - optional_skin_temperature
    recommended_release: "V1.5"
    claim_boundary: "Not a mental health diagnosis."
    no_read_conditions:
      - low_hrv_quality
      - unstable_respiration_proxy
      - excessive_motion

  circulation:
    id: "1.4"
    product_label: "Relative Perfusion Index"
    type: "trend_regression"
    primary_modalities:
      - finger_ppg
      - camera_rppg
    reference:
      - laser_doppler_perfusion
      - clinical_perfusion_index
    recommended_release: "V1"
    claim_boundary: "Trend metric before cross-subject absolute scoring."
    no_read_conditions:
      - poor_skin_roi
      - low_lighting
      - weak_finger_contact

  vascular_health:
    id: "1.5"
    product_label: "Arterial Stiffness / Reflection Proxy"
    type: "regression"
    primary_modalities:
      - finger_ppg
      - camera_rppg
    reference:
      - cfPWV
      - baPWV
      - AIx_75
    recommended_release: "V1.5"
    claim_boundary: "Proxy metric, not a disease diagnosis."
    no_read_conditions:
      - unstable_fiducials
      - low_morphology_confidence
      - out_of_validated_range

  vascular_age:
    id: "1.6"
    product_label: "AI-PPG Vascular Age Gap"
    type: "regression"
    primary_modalities:
      - finger_ppg
      - camera_rppg
    reference:
      - chronological_age
      - longitudinal_outcomes
    recommended_release: "V1.5"
    claim_boundary: "Risk-style biomarker, not a diagnosis."
    no_read_conditions:
      - out_of_distribution_subject
      - high_model_uncertainty

  blood_pressure:
    id: "1.7"
    product_label: "Cuffless Blood Pressure"
    type: "regression"
    primary_modalities:
      - finger_ppg
      - camera_rppg
    reference:
      - oscillometric_cuff
      - optional_continuous_arterial_reference
    recommended_release: "V2"
    claim_boundary: "Separate regulated workflow."
    no_read_conditions:
      - missing_calibration
      - expired_calibration
      - excessive_motion
      - high_model_uncertainty
      - out_of_distribution_subject

open_source_components:
  - name: "rPPG-Toolbox"
    url: "https://github.com/ubicomplab/rPPG-Toolbox"
    role: "Camera rPPG benchmarking and model development."
  - name: "pyVHR"
    url: "https://github.com/phuselab/pyVHR"
    role: "Classical camera-rPPG baselines and evaluation."
  - name: "pyPPG"
    url: "https://pubmed.ncbi.nlm.nih.gov/38478997/"
    role: "Finger PPG fiducials and biomarker extraction."
  - name: "NeuroKit2"
    url: "https://github.com/neuropsychology/NeuroKit"
    role: "Signal cleaning, HRV, simulation, and QA."
  - name: "PaPaGei"
    url: "https://github.com/Nokia-Bell-Labs/papagei-foundation-model"
    role: "Pretrained optical-physiology embeddings for downstream tasks."
  - name: "bp-benchmark"
    url: "https://github.com/inventec-ai-center/bp-benchmark"
    role: "PPG-based blood pressure feature baselines."
  - name: "remotebiosensing/rppg"
    url: "https://github.com/remotebiosensing/rppg"
    role: "Remote PPG and non-invasive BP benchmarking."
  - name: "PPG2ABP"
    url: "https://github.com/nibtehaz/PPG2ABP"
    role: "ABP waveform estimation baseline from PPG."
