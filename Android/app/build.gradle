plugins {
    id 'com.android.application'
}

android {
    namespace 'com.aihealthcare.viewer'
    compileSdk 36

    defaultConfig {
        applicationId 'com.aihealthcare.viewer'
        minSdk 25
        targetSdk 36
        versionCode 1
        versionName '0.1.0'
    }

    buildTypes {
        debug {
            minifyEnabled false
        }

        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig true
    }
}

dependencies {
}
